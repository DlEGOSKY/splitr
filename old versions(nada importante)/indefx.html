<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Mini Games: Luxury Edition</title>
    
    <!-- Google Fonts: Orbitron para títulos, Inter para UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- CORE STYLES --- */
        :root {
            --bg-dark: #050505;
            --primary: #3b82f6;
            --accent: #f43f5e;
            --success: #10b981;
            --gold: #fbbf24;
            --purple: #a855f7;
            --cyan: #06b6d4;
            --bio: #84cc16; 
            --geo: #f59e0b; /* Color Naranja para Geo-Net */
            --neutral: #94a3b8;
            --text-main: #e2e8f0;
            --card-surface: rgba(30, 41, 59, 0.9);
            --font-display: 'Orbitron', sans-serif;
            --font-ui: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-ui);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- CRT & VIGNETTE EFFECTS --- */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 100;
        }

        /* --- LAYERS --- */
        #game-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
            width: 100%; height: 100%;
            transition: filter 0.5s ease;
        }

        #ui-layer {
            position: absolute;
            z-index: 10;
            width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; /* Safe area padding */
        }

        /* --- ANIMATIONS --- */
        @keyframes slideOutLeft { to { transform: translateX(-120%) rotate(-15deg); opacity: 0; } }
        @keyframes slideInRight { from { transform: translateX(120%) rotate(15deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-5px, -2px); }
            20%, 40%, 60%, 80% { transform: translate(5px, 2px); }
        }
        @keyframes flashWhite { 0% { background-color: rgba(255,255,255,0.4); } 100% { background-color: transparent; } }
        @keyframes pulse-shield { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        @keyframes scanline { 0% { top: 0%; } 100% { top: 100%; } }

        .card-exit { animation: slideOutLeft 0.4s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards; }
        .card-enter { animation: slideInRight 0.4s cubic-bezier(0.215, 0.610, 0.355, 1.000) forwards; }
        .shake-screen { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        .flash-screen { animation: flashWhite 0.3s ease-out; position: absolute; top:0; left:0; right:0; bottom:0; z-index: 50; pointer-events:none; }

        /* --- SCREENS --- */
        .screen {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%; height: 100%;
            background: transparent;
            transition: opacity 0.4s ease, transform 0.4s ease;
            text-align: center;
            max-width: 100%;
        }

        .screen.hidden {
            display: none;
            opacity: 0;
            transform: scale(0.95);
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3.5rem); /* Responsive Font Size */
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            line-height: 1.2;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- MENUS (Responsive Grid) --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
            padding: 10px;
            max-height: 70vh;
            overflow-y: auto; 
        }

        /* --- BUTTONS --- */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-family: var(--font-display);
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            margin: 10px;
            text-transform: uppercase;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.98); }
        .btn:hover { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); background: #60a5fa; }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: none;
            color: #94a3b8;
        }
        .btn-secondary:hover { border-color: white; color: white; }

        /* --- GAME UI: HUD --- */
        #game-ui-overlay {
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .hud-top {
            position: absolute;
            top: 10px; left: 15px; right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 50;
        }

        .score-box { text-align: left; }
        .score-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .score-value { font-family: var(--font-display); font-size: 2rem; color: var(--text-main); text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .credits-value { font-family: var(--font-display); font-size: 1rem; color: var(--gold); display: flex; align-items: center; gap: 5px; }

        .streak-badge {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--gold);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
        }
        .streak-badge.active { opacity: 1; transform: translateY(0); }

        /* --- GAME UI: CARD FLIPPER & STAGE (Responsive) --- */
        .card-stage, .card-flipper {
            position: relative;
            width: 220px; height: 320px;
            perspective: 1000px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .card-flipper.flipped { transform: rotateY(180deg); }

        @media (max-width: 480px) {
            .card-stage, .card-flipper { width: 160px; height: 240px; margin-bottom: 15px; }
            .btn-decision { width: 60px; height: 60px; font-size: 1.5rem; }
            .controls-container { gap: 20px; }
            .skill-btn { width: 45px; height: 45px; }
            h2 { font-size: 1rem; margin-bottom: 1rem; }
        }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card-front { transform: rotateY(180deg); }
        .card-back {
            background: repeating-linear-gradient(45deg, #1e293b, #1e293b 10px, #334155 10px, #334155 20px);
            border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 3rem;
        }

        .card-stage.shielded::after {
            content: "🛡️ SHIELD";
            position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%);
            color: var(--success); font-size: 0.7rem; font-weight: bold; white-space: nowrap; text-shadow: 0 0 10px var(--success);
        }
        .card-stage.shielded .playing-card { box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); animation: pulse-shield 2s infinite; }

        .playing-card {
            width: 100%; height: 100%;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            position: absolute; top: 0; left: 0; z-index: 2;
            backface-visibility: hidden;
        }

        .holo-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 70%);
            background-size: 200% 200%; opacity: 0; pointer-events: none; z-index: 3; mix-blend-mode: overlay;
        }
        .playing-card.holo .holo-overlay { opacity: 1; animation: shimmer 2s infinite linear; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- CONTROLS --- */
        .game-interactions { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }
        .controls-container { display: flex; gap: 30px; align-items: center; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .risk-meter { width: 60px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .risk-fill { height: 100%; width: 50%; background: var(--success); transition: width 0.3s, background-color 0.3s; }

        .btn-decision {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
            font-size: 2rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px); position: relative;
        }
        .btn-decision:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); }
        .btn-lower:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 30px rgba(244, 63, 94, 0.4); }
        .btn-higher:hover { border-color: var(--success); color: var(--success); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        
        /* SKILLS BAR */
        .skills-bar { display: flex; gap: 15px; margin-top: 5px; flex-wrap: wrap; justify-content: center; }
        .skill-btn {
            width: 50px; height: 50px; border-radius: 12px;
            background: rgba(168, 85, 247, 0.1); border: 1px solid var(--purple); color: var(--purple);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
        }
        .skill-btn:hover:not(.disabled) { background: var(--purple); color: white; box-shadow: 0 0 15px var(--purple); transform: translateY(-2px); }
        .skill-btn.disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; border-color: #475569; }
        .skill-icon { font-size: 1.2rem; margin-bottom: 2px; }
        .skill-cost { font-size: 0.6rem; font-weight: bold; }

        /* --- GUESS GAME SPECIFIC --- */
        .bet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; width: 100%; max-width: 320px; }
        .bet-btn {
            padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: white; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; min-height: 60px; justify-content: center;
        }
        .bet-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--gold); }
        .bet-btn span { font-size: 1.2rem; }
        .bet-btn small { font-size: 0.6rem; opacity: 0.7; margin-top: 2px; }

        /* --- TRIVIA & BIO-SCAN SPECIFIC --- */
        .trivia-container { width: 100%; max-width: 500px; text-align: center; padding: 0 10px; }
        .trivia-q { font-size: 1rem; margin-bottom: 15px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .trivia-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .trivia-btn {
            background: rgba(6, 182, 212, 0.1); border: 1px solid var(--cyan); color: #fff;
            padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem;
            word-break: break-word; /* Prevent long words breaking layout */
        }
        .trivia-btn:hover { background: var(--cyan); box-shadow: 0 0 15px var(--cyan); }
        
        .timer-bar-bg { 
            width: 100%; height: 8px; background: rgba(255,255,255,0.1); 
            border-radius: 4px; margin-bottom: 20px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.2); 
        }
        .timer-bar-fill { 
            height: 100%; background: var(--cyan); width: 100%; 
            transition: width 0.1s linear, background-color 0.3s; 
            box-shadow: 0 0 10px currentColor; 
        }

        /* Bio Scan Styles override for green theme */
        .bio-btn { border-color: var(--bio); background: rgba(132, 204, 22, 0.1); }
        .bio-btn:hover { background: var(--bio); box-shadow: 0 0 15px var(--bio); }
        .bio-image-container {
            width: 250px; height: 250px; border-radius: 12px; overflow: hidden; margin: 0 auto 20px;
            border: 2px solid var(--bio); position: relative; box-shadow: 0 0 20px rgba(132, 204, 22, 0.2);
        }
        /* Eliminamos el filtro por defecto aquí para controlarlo solo con JS o dejarlo por defecto */
        .bio-image { width: 100%; height: 100%; object-fit: cover; } 
        
        .bio-scan-line {
            position: absolute; top:0; left:0; width:100%; height: 5px; background: rgba(132, 204, 22, 0.8);
            box-shadow: 0 0 15px var(--bio); animation: scanline 2s linear infinite; pointer-events: none;
        }

        /* Geo Net Styles override for orange theme */
        .geo-btn { border-color: var(--geo); background: rgba(245, 158, 11, 0.1); }
        .geo-btn:hover { background: var(--geo); box-shadow: 0 0 15px var(--geo); }
        .geo-flag-container {
            width: 280px; height: 180px; border-radius: 8px; overflow: hidden; margin: 0 auto 25px;
            border: 2px solid var(--geo); position: relative; box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }
        .geo-flag { width: 100%; height: 100%; object-fit: cover; }

        .history-bar { position: absolute; bottom: 20px; display: flex; gap: 5px; opacity: 0.7; }
        .history-card { width: 30px; height: 42px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); background-size: cover; opacity: 0.5; transition: 0.3s; }
        .history-card:last-child { opacity: 1; transform: scale(1.1); border-color: var(--primary); }

        .popup-score {
            position: absolute; font-family: var(--font-display); font-weight: 900; font-size: 2rem;
            color: var(--gold); text-shadow: 0 5px 15px rgba(0,0,0,0.5); pointer-events: none;
            animation: floatUp 1s ease-out forwards; z-index: 100;
            width: 100%;
        }
        .popup-score.critical { font-size: 3rem; color: #fff; text-shadow: 0 0 20px var(--gold); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(0.5); } 50% { transform: translateY(-30px) scale(1.2); } 100% { opacity: 0; transform: translateY(-60px) scale(1); } }

        .loader {
            width: 40px; height: 40px; border: 3px solid #FFF; border-radius: 50%;
            display: inline-block; position: relative; box-sizing: border-box; animation: rotation 1s linear infinite;
        }
        .loader::after {
            content: ''; box-sizing: border-box; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; border-bottom-color: var(--primary);
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="vignette"></div>
    <div id="flash-layer"></div>
    <canvas id="game-canvas"></canvas>

    <div id="ui-layer">
        
        <!-- WELCOME SCREEN -->
        <section id="screen-welcome" class="screen">
            <h1>Arcade<br><span style="font-size:0.6em; letter-spacing:8px; color:var(--primary)">Luxury</span></h1>
            <button id="btn-start" class="btn">Conectar Sistema</button>
            <p style="margin-top: 30px; font-family: monospace; color: #64748b; font-size: 0.8rem;">INIT_CORE_MODULES...</p>
        </section>

        <!-- MENU SCREEN -->
        <section id="screen-menu" class="screen hidden">
            <h2>Seleccionar Protocolo</h2>
            <div class="menu-grid">
                <!-- Game 1 -->
                <button class="btn" style="min-width: 0; height: 160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; margin:0;" data-game="higher-lower">
                    <span style="font-size: 2.5rem;">🃏</span>
                    <span>High / Low</span>
                    <span style="font-size:0.6rem; opacity:0.6; font-family:monospace;">Earn Credits</span>
                </button>
                
                <!-- Game 2 -->
                <button class="btn" style="min-width: 0; height: 160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border-color: var(--purple); background: rgba(168, 85, 247, 0.1); margin:0;" data-game="guess-card">
                    <span style="font-size: 2.5rem;">🔮</span>
                    <span>The Oracle</span>
                    <span style="font-size:0.6rem; opacity:0.6; font-family:monospace;">Spend Credits</span>
                </button>

                <!-- Game 3 -->
                <button class="btn" style="min-width: 0; height: 160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border-color: var(--cyan); background: rgba(6, 182, 212, 0.1); margin:0;" data-game="trivia">
                    <span style="font-size: 2.5rem;">🧠</span>
                    <span>Neural Trivia</span>
                    <span style="font-size:0.6rem; opacity:0.6; font-family:monospace;">Fee: $15 | Win: $30</span>
                </button>

                <!-- Game 4 -->
                <button class="btn" style="min-width: 0; height: 160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border-color: var(--bio); background: rgba(132, 204, 22, 0.1); margin:0;" data-game="bio-scan">
                    <span style="font-size: 2.5rem;">🧬</span>
                    <span>Bio-Scan</span>
                    <span style="font-size:0.6rem; opacity:0.6; font-family:monospace;">Fee: $20 | Win: $40</span>
                </button>

                <!-- Game 5 (New) -->
                <button class="btn" style="min-width: 0; height: 160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border-color: var(--geo); background: rgba(245, 158, 11, 0.1); margin:0;" data-game="geo-net">
                    <span style="font-size: 2.5rem;">🌍</span>
                    <span>Geo-Net</span>
                    <span style="font-size:0.6rem; opacity:0.6; font-family:monospace;">Fee: $25 | Win: $55</span>
                </button>

                <!-- Placeholders -->
                <button class="btn btn-secondary" style="height:140px; margin:0; opacity:0.5; cursor:not-allowed;">🔒<br><span style="font-size:0.8rem">Hyper-Reflex</span><br><span style="font-size:0.6rem">Reaction</span></button>
            </div>
            <p style="margin-top: 20px; color: var(--gold); font-size: 0.9rem;">Global Credits: $<span id="menu-credits">0</span></p>
        </section>

        <!-- GAME CONTAINER -->
        <section id="screen-game" class="screen hidden">
            <div id="game-ui-overlay">
                <!-- Injected via JS -->
            </div>
            <div class="hud-top">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="ui-score">0</div>
                    <div class="credits-value" id="ui-credits">
                        <span style="font-size:0.9rem;">$</span> <span id="val-credits">0</span>
                    </div>
                </div>
                <div class="score-box" style="text-align:right">
                    <div class="streak-badge" id="ui-streak">🔥 x1</div>
                    <button id="btn-quit" class="btn-secondary" style="padding: 5px 15px; font-size: 0.7rem; margin-top:5px; min-width: auto;">ABORT</button>
                </div>
            </div>
        </section>

    </div>

    <script>
        // ==========================================
        // CONFIGURATION & STATE
        // ==========================================
        const CONFIG = {
            STATES: { WELCOME: 'welcome', MENU: 'menu', GAME: 'game' },
            API: { 
                DECK: 'https://deckofcardsapi.com/api/deck',
                BIO: 'https://dog.ceo/api'
            },
            COLORS: {
                DEFAULT: '#0f172a',
                STREAK_3: '#1e3a8a', STREAK_6: '#581c87', STREAK_9: '#7f1d1d',
                GOLD: '#fbbf24', PURPLE: '#a855f7', CYAN: '#06b6d4', BIO: '#84cc16', GEO: '#f59e0b'
            },
            SKILLS: {
                SWAP: { id: 'swap', cost: 35, icon: '🔄', name: 'Swap' },
                ORACLE: { id: 'oracle', cost: 75, icon: '🔮', name: 'Peek' },
                SHIELD: { id: 'shield', cost: 150, icon: '🛡️', name: 'Shield' }
            }
        };

        // --- DATA ---
        const TRIVIA_DATA = [
            { c: "CIENCIA", q: "¿Cuál es el elemento químico más abundante en el universo?", a: "Hidrógeno", i: ["Oxígeno", "Carbono", "Helio"] },

        // ==========================================
        // AUDIO SYSTEM
        // ==========================================
        class AudioSynth {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.3;
                this.masterGain.connect(this.ctx.destination);
            }
            playTone(freq, type = 'sine', duration = 0.1) {
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }
            playWin(streak) {
                const baseFreq = 400 + (streak * 50);
                this.playTone(baseFreq, 'triangle', 0.2);
                setTimeout(() => this.playTone(baseFreq * 1.25, 'sine', 0.2), 50); 
                setTimeout(() => this.playTone(baseFreq * 1.5, 'sine', 0.4), 100); 
            }
            playLose() {
                this.playTone(150, 'sawtooth', 0.4);
                setTimeout(() => this.playTone(100, 'sawtooth', 0.4), 100);
            }
            playClick() { this.playTone(800, 'square', 0.05); }
            playBuy() { this.playTone(1200, 'sine', 0.1); this.playTone(1800, 'sine', 0.2); }
            playShieldBreak() { this.playTone(200, 'square', 0.2); this.playTone(150, 'square', 0.4); }
        }

        // ==========================================
        // VISUAL SYSTEM
        // ==========================================
        class CanvasManager {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.particles = [];
                this.bgColor = CONFIG.COLORS.DEFAULT;
                this.targetBgColor = CONFIG.COLORS.DEFAULT;
                this.loop();
            }
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            setMood(streak) {
                if(streak === 'MYSTERY') { this.targetBgColor = CONFIG.COLORS.PURPLE; return; }
                if(streak === 'TECH') { this.targetBgColor = CONFIG.COLORS.CYAN; return; }
                if(streak === 'BIO') { this.targetBgColor = '#365314'; return; } 
                if(streak === 'GEO') { this.targetBgColor = '#7c2d12'; return; } // Dark Orange/Brown
                if(streak >= 9) this.targetBgColor = CONFIG.COLORS.STREAK_9;
                else if(streak >= 6) this.targetBgColor = CONFIG.COLORS.STREAK_6;
                else if(streak >= 3) this.targetBgColor = CONFIG.COLORS.STREAK_3;
                else this.targetBgColor = CONFIG.COLORS.DEFAULT;
            }
            lerpColor(a, b, t) {
                const ah = parseInt(a.replace('#', ''), 16), ar = ah >> 16, ag = ah >> 8 & 0xff, ab = ah & 0xff,
                      bh = parseInt(b.replace('#', ''), 16), br = bh >> 16, bg = bh >> 8 & 0xff, bb = bh & 0xff,
                      rr = ar + t * (br - ar), rg = ag + t * (bg - ag), rb = ab + t * (bb - ab);
                return '#' + ((1 << 24) + (Math.round(rr) << 16) + (Math.round(rg) << 8) + Math.round(rb)).toString(16).slice(1);
            }
            explode(x, y, color) {
                for(let i=0; i<30; i++) {
                    let vy = (Math.random() - 0.5) * 15;
                    this.particles.push({
                        x: x || this.canvas.width/2, y: y || this.canvas.height/2,
                        vx: (Math.random() - 0.5) * 10, vy: vy, life: 1.0, color: color, size: Math.random() * 4 + 2
                    });
                }
            }
            loop() {
                this.bgColor = this.lerpColor(this.bgColor, this.targetBgColor, 0.05);
                this.ctx.fillStyle = this.bgColor;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.strokeStyle = 'rgba(255,255,255,0.05)'; this.ctx.lineWidth = 1;
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02;
                    this.ctx.globalAlpha = p.life; this.ctx.fillStyle = p.color;
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); this.ctx.fill();
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
                this.ctx.globalAlpha = 1;
                requestAnimationFrame(() => this.loop());
            }
        }

        class HigherLowerGame {
            constructor(canvas, audio, onQuit) {
                this.canvas = canvas;
                this.audio = audio;
                this.onQuit = onQuit;
                this.deckId = null;
                this.currentCard = null;
                this.score = 0;
                this.streak = 0;
                this.history = [];
                this.difficulty = 'NORMAL';
                this.shieldActive = false;
                this.peekedCard = null;
                this.uiContainer = document.getElementById('game-ui-overlay');
            }

            async init() { this.showDifficultySelect(); }

            showDifficultySelect() {
                this.uiContainer.innerHTML = `
                    <h2 style="color: #fff; text-shadow: 0 0 15px var(--primary);">MODO DE JUEGO</h2>
                    <div style="display:flex; gap:20px; justify-content:center; margin-top:20px; flex-wrap:wrap;">
                        <button class="btn" id="mode-normal" style="flex-direction:column; gap:5px;"><span>🔵 NORMAL</span><span style="font-size:0.7rem; opacity:0.7;">Estándar</span></button>
                        <button class="btn" id="mode-hardcore" style="flex-direction:column; gap:5px; background:#be123c;"><span>☠️ HARDCORE</span><span style="font-size:0.7rem; opacity:0.7;">Doble o Nada</span></button>
                    </div>`;
                document.getElementById('mode-normal').onclick = () => { this.difficulty = 'NORMAL'; this.audio.playClick(); this.startGameLoop(); };
                document.getElementById('mode-hardcore').onclick = () => { this.difficulty = 'HARDCORE'; this.audio.playShieldBreak(); this.startGameLoop(); };
            }

            async startGameLoop() {
                this.uiContainer.innerHTML = '<div class="loader"></div>';
                try {
                    const res = await fetch(`${CONFIG.API.DECK}/new/shuffle/?deck_count=1`);
                    const data = await res.json();
                    this.deckId = data.deck_id;
                    this.resetRoundState();
                    this.currentCard = await this.fetchCard();
                    this.updateHUD();
                    this.renderTable();
                } catch(e) { this.uiContainer.innerHTML = '<p>Error de conexión.</p>'; setTimeout(() => this.onQuit(), 2000); }
            }

            resetRoundState() {
                this.score = 0;
                this.streak = 0;
                this.history = [];
                this.shieldActive = false;
                this.peekedCard = null;
            }

            async fetchCard() {
                let res = await fetch(`${CONFIG.API.DECK}/${this.deckId}/draw/?count=1`);
                let data = await res.json();
                if (data.remaining < 2) await fetch(`${CONFIG.API.DECK}/${this.deckId}/shuffle/`);
                return data.cards[0];
            }

            getCardValue(card) {
                const val = card.value;
                if (val === "ACE") return 14; if (val === "KING") return 13; if (val === "QUEEN") return 12; if (val === "JACK") return 11;
                return parseInt(val) || 0;
            }

            renderTable() {
                const isHolo = ['KING','QUEEN','JACK','ACE'].includes(this.currentCard.value);
                const val = this.getCardValue(this.currentCard);
                const probHigher = Math.max(5, Math.min(100, ((14 - val) / 13) * 100));
                const probLower = Math.max(5, Math.min(100, ((val - 2) / 13) * 100));
                const canBuySwap = app.credits >= CONFIG.SKILLS.SWAP.cost;
                const canBuyOracle = app.credits >= CONFIG.SKILLS.ORACLE.cost && !this.peekedCard;
                const canBuyShield = app.credits >= CONFIG.SKILLS.SHIELD.cost && !this.shieldActive;
                const showMeters = this.difficulty === 'NORMAL';

                this.uiContainer.innerHTML = `
                    <div class="card-stage ${this.shieldActive ? 'shielded' : ''}" id="card-stage">
                        <div class="holo-overlay"></div>
                        <img src="${this.currentCard.image}" class="playing-card ${isHolo ? 'holo' : ''}" id="main-card">
                    </div>
                    <div class="game-interactions">
                        <div class="controls-container">
                            <div class="control-group">
                                <div class="btn-decision btn-lower" id="btn-low">▼</div>
                                <div class="risk-meter" style="opacity:${showMeters?1:0}"><div class="risk-fill" style="width:${probLower}%; background:${probLower>50?'var(--success)':'var(--accent)'}"></div></div>
                            </div>
                            <div class="control-group">
                                <div class="btn-decision btn-higher" id="btn-high">▲</div>
                                <div class="risk-meter" style="opacity:${showMeters?1:0}"><div class="risk-fill" style="width:${probHigher}%; background:${probHigher>50?'var(--success)':'var(--accent)'}"></div></div>
                            </div>
                        </div>
                        <div class="skills-bar">
                            <button class="skill-btn ${!canBuySwap ? 'disabled' : ''}" id="skill-swap"><span class="skill-icon">🔄</span><span class="skill-cost">$35</span></button>
                            <button class="skill-btn ${!canBuyOracle ? 'disabled' : ''}" id="skill-oracle"><span class="skill-icon">🔮</span><span class="skill-cost">$75</span></button>
                            <button class="skill-btn ${!canBuyShield ? 'disabled' : ''}" id="skill-shield"><span class="skill-icon">🛡️</span><span class="skill-cost">$150</span></button>
                        </div>
                    </div>
                    <div class="history-bar">${this.history.map(img => `<div class="history-card" style="background-image:url(${img})"></div>`).join('')}</div>
                `;

                document.getElementById('btn-low').onclick = () => this.makeMove('LOWER');
                document.getElementById('btn-high').onclick = () => this.makeMove('HIGHER');
                document.getElementById('skill-swap').onclick = () => { if(canBuySwap) this.activateSkill('SWAP'); };
                document.getElementById('skill-oracle').onclick = () => { if(canBuyOracle) this.activateSkill('ORACLE'); };
                document.getElementById('skill-shield').onclick = () => { if(canBuyShield) this.activateSkill('SHIELD'); };
            }

            async activateSkill(type) {
                const skill = CONFIG.SKILLS[type];
                app.credits -= skill.cost;
                this.audio.playBuy();
                this.updateHUD();
                
                if (type === 'SHIELD') { this.shieldActive = true; this.showFloatingText("ESCUDO ACTIVO", "var(--success)"); this.renderTable(); }
                if (type === 'SWAP') { this.currentCard = await this.fetchCard(); this.peekedCard = null; this.renderTable(); this.showFloatingText("SWAP!", "var(--purple)"); }
                if (type === 'ORACLE') {
                    if (!this.peekedCard) this.peekedCard = await this.fetchCard();
                    const val = this.getCardValue(this.peekedCard);
                    const curVal = this.getCardValue(this.currentCard);
                    let hint = val === curVal ? "IGUAL" : (val > curVal ? "MAYOR" : "MENOR");
                    this.showFloatingText(`ORÁCULO: ES ${hint}`, "var(--purple)");
                    this.renderTable();
                }
            }

            async makeMove(guess) {
                document.getElementById('btn-low').style.pointerEvents = 'none';
                document.getElementById('btn-high').style.pointerEvents = 'none';
                this.audio.playClick();

                let nextCard;
                if (this.peekedCard) { nextCard = this.peekedCard; this.peekedCard = null; }
                else { nextCard = await this.fetchCard(); }
                
                const img = new Image(); img.src = nextCard.image;
                img.onload = () => {
                    document.getElementById('main-card').classList.add('card-exit');
                    setTimeout(() => { this.resolve(guess, nextCard); }, 300); 
                };
            }

            resolve(guess, nextCard) {
                const curVal = this.getCardValue(this.currentCard);
                const nextVal = this.getCardValue(nextCard);
                let probability = 0.5;
                if (guess === 'HIGHER') probability = (14 - curVal) / 13; else probability = (curVal - 2) / 13;
                probability = Math.max(0.1, Math.min(0.9, probability));
                const pointsPot = Math.floor((1 / probability) * 10);
                
                let outcome = 'LOSE';
                if (curVal === nextVal) outcome = 'TIE';
                else if ((guess === 'HIGHER' && nextVal > curVal) || (guess === 'LOWER' && nextVal < curVal)) outcome = 'WIN';
                if (this.difficulty === 'HARDCORE' && outcome === 'TIE') outcome = 'LOSE';

                this.history.push(this.currentCard.image);
                if(this.history.length > 5) this.history.shift();
                this.currentCard = nextCard;
                this.renderTable();
                document.getElementById('main-card').classList.add('card-enter');

                if (outcome === 'WIN') {
                    this.streak++;
                    const multiplier = 1 + (Math.floor(this.streak / 3) * 0.5);
                    const hardcoreMult = this.difficulty === 'HARDCORE' ? 2 : 1;
                    const totalPoints = Math.floor(pointsPot * multiplier * hardcoreMult);
                    const creditsEarned = Math.max(5, Math.floor(totalPoints / 5)); 
                    
                    this.score += totalPoints;
                    app.credits += creditsEarned;
                    
                    this.showFloatingText(`+${totalPoints} (+$${creditsEarned})`, '#fbbf24');
                    this.audio.playWin(this.streak);
                    this.canvas.explode(null, null, CONFIG.COLORS.GOLD);
                    this.canvas.setMood(this.streak);
                } else if (outcome === 'TIE') {
                    this.showFloatingText("¡EMPATE! (SALVADO)", "var(--neutral)");
                    this.audio.playTone(300, 'square', 0.1); 
                } else {
                    if (this.shieldActive) {
                        this.shieldActive = false;
                        this.audio.playShieldBreak();
                        this.showFloatingText("¡ESCUDO ROTO!", "var(--success)");
                        document.body.classList.add('shake-screen');
                        setTimeout(() => document.body.classList.remove('shake-screen'), 500);
                        this.renderTable();
                    } else {
                        this.audio.playLose();
                        document.body.classList.add('shake-screen');
                        setTimeout(() => document.body.classList.remove('shake-screen'), 500);
                        this.showFloatingText("GAME OVER", "#f43f5e");
                        setTimeout(() => this.onQuit(), 2000);
                        return;
                    }
                }
                this.updateHUD();
            }

            showFloatingText(text, color) {
                const el = document.createElement('div'); el.className = 'popup-score';
                el.innerText = text; el.style.color = color; el.style.left = '50%'; el.style.top = '40%'; el.style.transform = 'translate(-50%, -50%)';
                document.body.appendChild(el); setTimeout(() => el.remove(), 1000);
            }

            updateHUD() {
                document.getElementById('ui-score').innerText = this.score;
                document.getElementById('val-credits').innerText = app.credits;
                const sBadge = document.getElementById('ui-streak');
                if(this.streak > 1) { sBadge.innerText = `🔥 x${this.streak}`; sBadge.classList.add('active'); }
                else { sBadge.classList.remove('active'); }
            }
        }

                    // Format: "german-shepherd" -> "German Shepherd"

                document.querySelector('[data-game="guess-card"]').onclick = () => {
                    this.game = new GuessCardGame(this.canvas, this.audio, () => this.endGame());
                    this.changeState(CONFIG.STATES.GAME);
                    this.game.init();
                };

                // Game 3
                document.querySelector('[data-game="trivia"]').onclick = () => {
                    this.game = new TriviaGame(this.canvas, this.audio, () => this.endGame());
                    this.changeState(CONFIG.STATES.GAME);
                    this.game.init();
                };

                // Game 4
                document.querySelector('[data-game="bio-scan"]').onclick = () => {
                    this.game = new BioScanGame(this.canvas, this.audio, () => this.endGame());
                    this.changeState(CONFIG.STATES.GAME);
                    this.game.init();
                };

                // Game 5
                document.querySelector('[data-game="geo-net"]').onclick = () => {
                    this.game = new GeoNetGame(this.canvas, this.audio, () => this.endGame());
                    this.changeState(CONFIG.STATES.GAME);
                    this.game.init();
                };

                document.getElementById('btn-quit').onclick = () => this.endGame();
            },

            endGame() {
                if(this.game && this.game.timerInterval) clearInterval(this.game.timerInterval);
                this.game = null;
                this.canvas.setMood(0);
                this.changeState(CONFIG.STATES.MENU);
            },

            changeState(newState) {
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                if(newState === CONFIG.STATES.WELCOME) document.getElementById('screen-welcome').classList.remove('hidden');
                if(newState === CONFIG.STATES.MENU) {
                    document.getElementById('screen-menu').classList.remove('hidden');
                    document.getElementById('menu-credits').innerText = this.credits;
                }
                if(newState === CONFIG.STATES.GAME) {
                    document.getElementById('screen-game').classList.remove('hidden');
                    document.getElementById('val-credits').innerText = this.credits;
                }
            }
        };

        window.onload = () => app.init();

    </script>
</body>
</html>
